<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente de Voz - Azure CLU + ESP32</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SDK Azure Speech -->
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .container-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
        }

        .intent {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0d6efd;
        }

        .score {
            font-size: 1.2rem;
            color: #198754;
        }

        .status {
            font-size: 1.3rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container-card">
        <h3 class="text-center mb-4">Assistente de Voz IoT (Azure)</h3>

        <div class="mb-3">
            <input type="text" id="texto" class="form-control" placeholder="Digite ou fale: ligar o led">
        </div>

        <div class="d-grid gap-2 mb-3">
            <button class="btn btn-primary btn-lg" onclick="analisar()">
                Enviar Texto
            </button>

            <button class="btn btn-danger btn-lg" onclick="falarAzure()">
                🎤 Falar com Azure
            </button>
        </div>

        <div class="card p-3 text-center">
            <p>Intenção:</p>
            <div id="intent" class="intent">---</div>

            <p class="mt-2">Confiança:</p>
            <div id="score" class="score">---</div>

            <p class="mt-3">Status:</p>
            <div id="statusLED" class="status text-secondary">Aguardando...</div>
        </div>
    </div>

    <script>
        // ==========================
        // CONFIGURAÇÕES
        // ==========================

        // Azure Speech
        const speechKey = "9ywQSQW6MnFn7hKROQluxjDue7Kglc76rNJRVGUIzlIZtsLumQBHJQQJ99CCACHrzpqXJ3w3AAAYACOGu6wu"; 
        const speechRegion = "northcentralus";

        // Azure CLU
        const endpoint = "https://pedromihosenai.cognitiveservices.azure.com/";
        const apiKey = "8ji9eYcJC1GkdEMbpoH9oLhLnvFcRjUnortgo1FWPraBUK3H62yUJQQJ99CDACLArgHXJ3w3AAAaACOG39qS";
        const projectName = "PedroMiho";
        const deploymentName = "CLU";

        // IP do ESP32 na rede local 
        const esp32IP = "10.0.0.85";

        // ==========================
        // VOZ - AZURE SPEECH
        // ==========================
        function falarAzure() {

            const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(speechKey, speechRegion);
            speechConfig.speechRecognitionLanguage = "pt-BR";

            const audioConfig = SpeechSDK.AudioConfig.fromDefaultMicrophoneInput();
            const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);

            document.getElementById("statusLED").innerText = "Ouvindo...";
            document.getElementById("statusLED").className = "status text-warning";

            recognizer.recognizeOnceAsync(result => {

                if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {

                    const textoFalado = result.text;
                    document.getElementById("texto").value = textoFalado;

                    document.getElementById("statusLED").innerText =
                        "Você disse: " + textoFalado;

                    analisar();
                }
                else {
                    document.getElementById("statusLED").innerText =
                        "Não foi possível reconhecer a fala";
                    document.getElementById("statusLED").className = "status text-danger";
                }

                recognizer.close();
            });
        }

        // ==========================
        // CLU + ENVIO PARA ESP32
        // ==========================
        async function analisar() {

            const texto = document.getElementById("texto").value;
            if (!texto) {
                alert("Digite ou fale um comando");
                return;
            }

            const url = endpoint + "/language/:analyze-conversations?api-version=2024-11-15-preview";

            const body = {
                kind: "Conversation",
                analysisInput: {
                    conversationItem: {
                        id: "1",
                        text: texto,
                        modality: "text",
                        language: "pt-br",
                        participantId: "user"
                    }
                },
                parameters: {
                    projectName: projectName,
                    deploymentName: deploymentName,
                    stringIndexType: "TextElement_V8"
                }
            };

            document.getElementById("statusLED").innerText = "Analisando...";
            document.getElementById("statusLED").className = "status text-warning";

            try {

                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Ocp-Apim-Subscription-Key": apiKey,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (data.error) {
                    document.getElementById("statusLED").innerText = data.error.message;
                    document.getElementById("statusLED").className = "status text-danger";
                    console.log(data);
                    return;
                }

                const intent = data.result.prediction.topIntent;
                const score = data.result.prediction.intents.find(({ category }) => category == intent).confidenceScore;

                document.getElementById("intent").innerText = intent;
                document.getElementById("score").innerText = (score * 100).toFixed(2) + "%";

                // ==========================
                // ENVIO PARA ESP32
                // ==========================
                if (score > 0.7) {

                    try {

                        if (intent === "LigarDispositivo") {
                            await fetch(`http://${esp32IP}/?action=ligar`);
                            document.getElementById("statusLED").innerText = "LED LIGADO";
                            document.getElementById("statusLED").className = "status text-success";
                        }

                        else if (intent === "DesligarDispositivo") {
                            await fetch(`http://${esp32IP}/?action=desligar`);
                            document.getElementById("statusLED").innerText = "LED DESLIGADO";
                            document.getElementById("statusLED").className = "status text-danger";
                        }

                        else {
                            document.getElementById("statusLED").innerText = "Nenhuma ação configurada";
                            document.getElementById("statusLED").className = "status text-secondary";
                        }

                    } catch {
                        document.getElementById("statusLED").innerText =
                            "Intenção reconhecida, mas não conseguiu comunicar com o ESP32";
                        document.getElementById("statusLED").className = "status text-warning";
                    }

                } else {
                    document.getElementById("statusLED").innerText = "Confiança baixa";
                    document.getElementById("statusLED").className = "status text-secondary";
                }

            } catch (error) {
                document.getElementById("statusLED").innerText = "Erro ao comunicar com o CLU";
                document.getElementById("statusLED").className = "status text-danger";
                console.error(error);
            }
        }
    </script>

</body>

</html>
